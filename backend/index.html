<!-- public/index.html -->
<!DOCTYPE html>
<html>
<head>
    <title>Collaborative Markdown Editor</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/easymde/dist/easymde.min.css">
    <script src="https://cdn.jsdelivr.net/npm/easymde/dist/easymde.min.js"></script>
</head>
<body>
    <textarea id="markdown-editor"></textarea>
    <script>
        const docId = window.location.pathname.substring(1) || 'default';
        const ws = new WebSocket(`ws://localhost:8080/ws?docId=${docId}`);
        
        const easyMDE = new EasyMDE({
            element: document.getElementById('markdown-editor'),
            autosave: {
                enabled: false  // We'll use WebSocket for saving
            }
        });
        
        let isRemoteChange = false;
        
        ws.onmessage = (e) => {
            isRemoteChange = true;
            easyMDE.value(e.data);
            isRemoteChange = false;
        };
        
        easyMDE.codemirror.on('change', () => {
            if (!isRemoteChange) {
                ws.send(easyMDE.value());
            }
        });
    </script>
</body>
</html>
